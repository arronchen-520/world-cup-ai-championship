name: Daily AI football analysis

on:
  schedule:
    # Chicago midnight is 05:05 UTC in CDT and 06:05 UTC in CST.
    # The Python guard ensures only the correct invocation runs.
    - cron: "5 5,6 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: Optional date (YYYY-MM-DD)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-football-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Analyze selected day
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          MATCH_TIMEZONE: America/Chicago
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python run_daily.py --date "${{ inputs.date }}"
          else
            python run_daily.py --midnight-guard
          fi
      - name: Persist updated SQLite database
        run: |
          if [ -z "$(git status --porcelain -- data/championship.db)" ]; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/championship.db
          git commit -m "data: daily football analysis"
          git push
