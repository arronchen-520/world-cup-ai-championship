name: Daily AI football analysis

on:
  schedule:
    # Run once at 08:15 UTC (02:15 CST / 03:15 CDT). GitHub schedules can be
    # delayed, so use the Chicago date when the runner actually starts.
    - cron: "15 8 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: Optional date (YYYY-MM-DD)
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-football-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - run: git lfs install --local
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Analyze selected day
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          MATCH_TIMEZONE: America/Chicago
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python run_daily.py --date "${{ inputs.date }}"
          else
            python run_daily.py
          fi
      - name: Persist updated SQLite database
        run: |
          if [ ! -f data/championship.db ]; then
            echo "data/championship.db was not created; nothing to persist."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/championship.db
          if git diff --cached --quiet -- data/championship.db; then
            echo "data/championship.db is unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "data: daily football analysis"
          git push

  deploy-space:
    needs: analyze
    if: ${{ always() && needs.analyze.result == 'success' }}
    uses: ./.github/workflows/deploy-space.yml
    secrets: inherit
